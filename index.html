<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mubarak Al-Kabeer Registry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <style>
        :root{--primary:#8b0000;--primary-dark:#5c0000}
        body{background:#f4f6f9;font-family:sans-serif;font-size:0.85rem}
        .clinic-header{background:linear-gradient(135deg,var(--primary),#b30000);color:#fff;padding:20px 0;border-radius:0 0 15px 15px;position:relative}
        .card{border:none;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.05);margin-bottom:20px}
        .section-title{color:var(--primary);font-weight:bold;border-bottom:2px solid #e9ecef;padding-bottom:5px;margin-top:20px;margin-bottom:12px}
        label{font-weight:600;font-size:.75rem;color:#495057;display:block;margin-bottom:2px}
        .form-control,.form-select{border-radius:6px;font-size:.85rem;padding:4px 8px}
        .btn-medical{background:var(--primary);color:#fff;font-weight:bold;width:100%;padding:12px;border:none;border-radius:8px}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:9999;display:flex;justify-content:center;align-items:center}
        .modal-box{background:#fff;border-radius:16px;padding:30px 20px;text-align:center;max-width:350px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.4);animation:pop .3s ease}
        @keyframes pop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
        .modal-icon{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 15px;font-size:30px;color:#fff}
        .page{display:none}.page.active{display:block}
    </style>
</head>
<body>

<div id="pageMain" class="page active">
    <div class="clinic-header text-center">
        <button class="btn btn-dark btn-sm position-absolute top-0 end-0 m-2" onclick="showAdminLogin()">Admin</button>
        <i class="fa-solid fa-heart-pulse fa-3x mb-1"></i>
        <h2 class="fw-bold mb-0">Mubarak Al-Kabeer Hospital</h2>
        <p class="mb-0">Heart Failure Clinic Registry</p>
    </div>
    
    <div class="container mt-3 mb-5">
        <div class="card p-3 border-top border-4 border-danger shadow-sm">
            <h6 class="text-secondary fw-bold mb-2">Search Patient</h6>
            <div class="input-group">
                <input type="text" id="searchInput" class="form-control" placeholder="Civil ID or File Number">
                <button class="btn btn-primary px-4" onclick="searchPatient()">Search</button>
            </div>
            <div id="searchResults" class="mt-3"></div>
        </div>

        <div class="card p-3 border-top border-4 border-danger">
            <h4 class="mb-3 text-dark fw-bold" id="formTitle">New Patient Entry</h4>
            <div id="hfForm">
                <h6 class="section-title">1. Demographics</h6>
                <div class="row g-2">
                    <div class="col-6 col-md-3"><label class="text-primary fw-bold">Entered By *</label><select class="form-select border-primary" id="Doctor_Name"><option value="">Select...</option><option>Dr Farouk</option><option>Dr Badawy</option><option>Dr Ali</option><option>Dr Hamza</option><option>Dr Ahmed</option></select></div>
                    <div class="col-6 col-md-3"><label>Patient Name *</label><input type="text" class="form-control" id="Name"></div>
                    <div class="col-6 col-md-3"><label>Civil ID *</label><input type="number" class="form-control" id="Civil_ID"></div>
                    <div class="col-6 col-md-3"><label>File No *</label><input type="number" class="form-control" id="File_No"></div>
                    <div class="col-4 col-md-2"><label>Age</label><input type="number" class="form-control" id="Age"></div>
                    <div class="col-4 col-md-2"><label>Gender</label><select class="form-select" id="Gender"><option value="">Select...</option><option>Male</option><option>Female</option></select></div>
                    <div class="col-4 col-md-4"><label>Nationality</label><input type="text" class="form-control" id="Nationality"></div>
                    <div class="col-12 col-md-4"><label>Mobile</label><input type="number" class="form-control" id="Mobile"></div>
                </div>

                <h6 class="section-title">2. Signs & BMI</h6>
                <div class="row g-2">
                    <div class="col-4 col-md-2"><label class="text-primary">Height (cm)</label><input type="number" class="form-control border-primary" id="Height" oninput="calculateBMI()"></div>
                    <div class="col-4 col-md-2"><label class="text-primary">Weight (kg)</label><input type="number" class="form-control border-primary" id="Weight" oninput="calculateBMI()"></div>
                    <div class="col-4 col-md-2"><label class="text-success fw-bold">BMI</label><input type="text" class="form-control bg-light text-success fw-bold" id="BMI" readonly></div>
                    <div class="col-6 col-md-2"><label>NYHA Visit</label><select class="form-select" id="NYHA"><option value="">Select...</option><option>I</option><option>II</option><option>III</option><option>IV</option></select></div>
                    <div class="col-6 col-md-2"><label>BP</label><input type="text" class="form-control" id="BP" placeholder="120/80"></div>
                    <div class="col-6 col-md-2"><label>Pulse</label><input type="text" class="form-control" id="Pulse"></div>
                </div>

                <h6 class="section-title">3. Medications & Labs</h6>
                <div class="row g-2">
                    <div class="col-6 col-md-3"><label>ARNI (Entresto)</label><select class="form-select" id="Med_ARNI"><option>No</option><option>Yes</option></select></div>
                    <div class="col-6 col-md-3"><label>SGLT2i</label><select class="form-select" id="Med_SGLT2i"><option>None</option><option>Forxiga</option><option>Jardiance</option></select></div>
                    <div class="col-6 col-md-3"><label>Lipid Lowering</label><select class="form-select" id="Med_Lipid"><option>None</option><option>Lipitor</option><option>Crestor</option><option>Repatha</option></select></div>
                    <div class="col-6 col-md-3"><label>Antiplatelets</label><select class="form-select" id="Med_Antiplatelet"><option>None</option><option>ASA</option><option>Plavix</option><option>Brilinta</option></select></div>
                </div>

                <hr class="mt-4 border-danger">
                <button type="button" class="btn btn-medical shadow" id="submitBtn" onclick="savePatient()">SAVE PATIENT DATA</button>
                <button type="button" class="btn btn-secondary w-100 mt-2 d-none" id="cancelEditBtn" onclick="resetForm()">Cancel Edit</button>
            </div>
        </div>
    </div>
</div>

<div id="pageAdmin" class="page">
    <div class="clinic-header text-center">
        <button class="btn btn-light btn-sm position-absolute top-0 start-0 m-2" onclick="goToMain()">Back</button>
        <h2 class="fw-bold mb-0">Admin Dashboard</h2>
        <p class="mb-0">Registry Size: <span id="totalPatients">0</span></p>
    </div>
    <div class="container mt-3">
        <div class="card p-2 overflow-auto" style="max-height:80vh;">
            <table class="table table-sm table-hover text-center align-middle">
                <thead class="table-dark"><tr><th>File</th><th>Name</th><th>Doctor</th><th>Action</th></tr></thead>
                <tbody id="adminTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
// INITIALIZATION
firebase.initializeApp({
    apiKey:"AIzaSyAQ8wAh0gLV7-_lVEXXdIzZ7LmkMnshOiE",
    authDomain:"hf-clinic-registry.firebaseapp.com",
    projectId:"hf-clinic-registry",
    storageBucket:"hf-clinic-registry.firebasestorage.app",
    messagingSenderId:"898458296631",
    appId:"1:898458296631:web:85fea7a2c6661ae0563ab2"
});
var db=firebase.firestore();
var editingDocId=null;
var PC={}; // Patient Cache

function calculateBMI(){
    var w=parseFloat(document.getElementById("Weight").value);
    var h=parseFloat(document.getElementById("Height").value);
    if(w>0 && h>0) document.getElementById("BMI").value = (w/((h/100)**2)).toFixed(1);
    else document.getElementById("BMI").value = "";
}

function showAdminLogin(){
    var p=prompt("Admin PIN:");
    if(p==="1234"){ document.getElementById("pageMain").classList.remove("active"); document.getElementById("pageAdmin").classList.add("active"); loadAdmin(); }
    else if(p!==null) alert("Wrong PIN");
}

function goToMain(){ document.getElementById("pageAdmin").classList.remove("active"); document.getElementById("pageMain").classList.add("active"); }

function showPopup(type, title, msg){
    var old=document.getElementById("popOv"); if(old) old.remove();
    var color = type==="success" ? "#28a745" : "#dc3545";
    var icon = type==="success" ? "fa-check-circle" : "fa-info-circle";
    var ov=document.createElement("div"); ov.id="popOv"; ov.className="modal-overlay";
    ov.innerHTML="<div class='modal-box'><div class='modal-icon' style='background:"+color+"'><i class='fa-solid "+icon+"'></i></div><h4 style='color:"+color+"'>"+title+"</h4><p class='text-muted'>"+msg+"</p><button class='btn btn-dark w-100' onclick='this.parentElement.parentElement.remove()'>OK</button></div>";
    document.body.appendChild(ov);
}

function savePatient(){
    var data={}; 
    // Collect all data points dynamically
    document.querySelectorAll('#hfForm input, #hfForm select').forEach(el=>{ if(el.id) data[el.id]=el.value; });
    
    // CRITICAL SYNC CHECK: Use the exact IDs from the HTML
    if(!data.Doctor_Name || !data.Name || !data.Civil_ID || !data.File_No){ 
        alert("⚠️ Please fill the required fields:\nDoctor, Name, Civil ID, and File No."); 
        return; 
    }
    
    var btn=document.getElementById("submitBtn"); btn.disabled=true; btn.innerText="Saving to Cloud...";

    if(editingDocId){
        db.collection("patients").doc(editingDocId).update(data)
        .then(()=>{ showPopup("success","Updated!","Record updated."); resetForm(); })
        .catch(err=>{ alert("Update failed: " + err.message); btn.disabled=false; btn.innerText="Update Patient"; });
    } else {
        data.timestamp = new Date().toISOString();
        db.collection("patients").add(data)
        .then(()=>{ showPopup("success","Saved!","Patient added."); resetForm(); })
        .catch(err=>{ alert("Save failed: " + err.message); btn.disabled=false; btn.innerText="SAVE PATIENT DATA"; });
    }
}

function resetForm(){
    document.querySelectorAll('#hfForm input, #hfForm select').forEach(el=>{ el.value=""; });
    editingDocId=null;
    document.getElementById("submitBtn").disabled=false;
    document.getElementById("submitBtn").innerText="SAVE PATIENT DATA";
    document.getElementById("cancelEditBtn").classList.add("d-none");
    document.getElementById("formTitle").innerText="New Patient Entry";
}

function searchPatient(){
    var val=document.getElementById("searchInput").value, res=document.getElementById("searchResults");
    if(!val) return;
    res.innerHTML="Searching...";
    db.collection("patients").where("Civil_ID","==",val).get().then(s=>{
        if(s.empty) return db.collection("patients").where("File_No","==",val).get(); return s;
    }).then(s=>{
        res.innerHTML=""; if(s.empty){ res.innerHTML="Not found."; return; }
        s.forEach(d=>{ renderCard(d.data(), d.id); });
    });
}

function renderCard(data, id){
    PC[id]=data; var rows=""; 
    Object.keys(data).sort().forEach(k=>{ if(data[k]&&k!=="timestamp") rows+="<tr><th class='bg-light' style='width:40%'>"+k.replace(/_/g," ")+"</th><td>"+data[k]+"</td></tr>"; });
    document.getElementById("searchResults").innerHTML="<div class='card p-3 border-primary shadow-sm' id='pdf-"+id+"'><h5 class='text-primary'>"+data.Name+"</h5><table class='table table-sm table-bordered' style='font-size:0.65rem'><tbody>"+rows+"</tbody></table><div class='d-flex gap-2 mt-2'><button class='btn btn-sm btn-primary' onclick='editPt(\""+id+"\")'>Edit</button><button class='btn btn-sm btn-danger' onclick='pdfCard(\"pdf-"+id+"\",\""+data.File_No+"\")'>PDF</button></div></div>";
}

function loadAdmin(){
    var tb=document.getElementById("adminTableBody"); tb.innerHTML="Loading...";
    db.collection("patients").get().then(snap=>{
        tb.innerHTML=""; document.getElementById("totalPatients").innerText=snap.size;
        snap.forEach(docSnap=>{
            var d=docSnap.data(), id=docSnap.id; PC[id]=d;
            tb.innerHTML+="<tr><td>"+d.File_No+"</td><td>"+d.Name+"</td><td>"+d.Doctor_Name+"</td><td><button class='btn btn-sm btn-primary' onclick='editFromAdmin(\""+id+"\")'>Edit</button> <button class='btn btn-sm btn-danger' onclick='delPt(\""+id+"\")'>Del</button></td></tr>";
        });
    });
}

function editPt(id){
    var d=PC[id]; editingDocId=id;
    Object.keys(d).forEach(k=>{ var el=document.getElementById(k); if(el) el.value=d[k]||""; });
    document.getElementById("formTitle").innerText="Editing: "+d.Name;
    document.getElementById("cancelEditBtn").classList.remove("d-none");
    document.getElementById("submitBtn").innerText="Update Patient";
    window.scrollTo({top:0, behavior:"smooth"});
}

function editFromAdmin(id){ editPt(id); goToMain(); }

function delPt(id){
    if(confirm("Permanently delete?")){
        db.collection("patients").doc(id).delete().then(()=>{ showPopup("delete","Deleted","Record removed."); loadAdmin(); });
    }
}

function pdfCard(id, fno){
    var el=document.getElementById(id);
    html2pdf().from(el).set({margin:0.5, filename:"HF_Report_"+fno+".pdf", html2canvas:{scale:2}}).save();
}
</script>
</body>
</html>
