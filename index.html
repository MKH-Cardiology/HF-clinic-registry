<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mubarak Al-Kabeer HF Clinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4 mb-5">
    <h2 class="text-center mb-4 text-primary fw-bold">Mubarak Al-Kabeer Hospital<br><small class="text-muted fs-5">Heart Failure Clinic Registry</small></h2>

    <div class="card shadow-sm mb-4 border-primary">
        <div class="card-body bg-white">
            <h5 class="card-title text-primary">Search Patient Database</h5>
            <div class="input-group">
                <input type="text" id="searchInput" class="form-control" placeholder="Search by Civil ID or File Number...">
                <button class="btn btn-primary" id="searchBtn">Search</button>
            </div>
            <div id="searchResults" class="mt-3"></div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body bg-white">
            <h5 class="card-title border-bottom pb-2 mb-3">New Patient Entry</h5>
            
            <form id="hfForm">
                <h6 class="text-secondary mt-3 fw-bold bg-light p-2 rounded">1. Demographics</h6>
                <div class="row">
                    <div class="col-md-4 mb-2"><label>Name</label><input type="text" class="form-control" id="name" required></div>
                    <div class="col-md-4 mb-2"><label>Civil ID (12 Digits)</label><input type="number" class="form-control" id="civilId" required></div>
                    <div class="col-md-4 mb-2"><label>File No (6 Digits)</label><input type="number" class="form-control" id="fileNo" required></div>
                    <div class="col-md-3 mb-2"><label>Age</label><input type="number" class="form-control" id="age"></div>
                    <div class="col-md-3 mb-2"><label>Gender</label><select class="form-select" id="gender"><option value="">Select...</option><option value="Male">Male</option><option value="Female">Female</option></select></div>
                    <div class="col-md-3 mb-2"><label>Nationality</label><input type="text" class="form-control" id="nationality"></div>
                    <div class="col-md-3 mb-2"><label>Mobile No</label><input type="number" class="form-control" id="mobile"></div>
                </div>

                <h6 class="text-secondary mt-4 fw-bold bg-light p-2 rounded">2. HF Diagnosis & Status</h6>
                <div class="row">
                    <div class="col-md-3 mb-2"><label>Type of HF</label><select class="form-select" id="hfType"><option value="">Select...</option><option value="HFrEF">HFrEF</option><option value="HFmrEF">HFmrEF</option><option value="HFpEF">HFpEF</option></select></div>
                    <div class="col-md-3 mb-2"><label>Advanced HF</label><select class="form-select" id="advancedHf"><option value="No">No</option><option value="Yes">Yes</option></select></div>
                    <div class="col-md-3 mb-2"><label>EF at Diagnosis (%)</label><input type="number" class="form-control" id="ef"></div>
                    <div class="col-md-3 mb-2"><label>NYHA Visit</label><select class="form-select" id="nyha"><option value="">Select...</option><option value="I">I</option><option value="II">II</option><option value="III">III</option><option value="IV">IV</option></select></div>
                    <div class="col-md-4 mb-2"><label>Other Cardiomyopathies</label><input type="text" class="form-control" id="otherCardio"></div>
                    <div class="col-md-4 mb-2"><label>Valvular Disease</label><select class="form-select" id="valveDisease"><option value="No">No</option><option value="Yes">Yes</option></select></div>
                    <div class="col-md-4 mb-2"><label>Dry Weight (kg)</label><input type="number" class="form-control" id="dryWeight"></div>
                </div>

                <h6 class="text-secondary mt-4 fw-bold bg-light p-2 rounded">3. Hospitalizations & Devices</h6>
                <div class="row">
                    <div class="col-md-6 mb-2"><label>Device & Date (e.g. ICD Jan 2024)</label><input type="text" class="form-control" id="device"></div>
                    <div class="col-md-6 mb-2"><label>HF Admissions Last Year</label><input type="number" class="form-control" id="admissions"></div>
                    <div class="col-md-6 mb-2"><label>Last HF Admission Date</label><input type="date" class="form-control" id="lastAdmission"></div>
                    <div class="col-md-6 mb-2"><label>Length of Stay (Days)</label><input type="number" class="form-control" id="los"></div>
                </div>

                <h6 class="text-secondary mt-4 fw-bold bg-light p-2 rounded">4. Investigations</h6>
                <div class="row">
                    <div class="col-md-3 mb-2"><label>LBBB</label><select class="form-select" id="lbbb"><option value="No">No</option><option value="Yes">Yes</option></select></div>
                    <div class="col-md-3 mb-2"><label>QRS Width (ms)</label><input type="number" class="form-control" id="qrs"></div>
                    <div class="col-md-3 mb-2"><label>Arrhythmia</label><input type="text" class="form-control" id="arrhythmia"></div>
                    <div class="col-md-3 mb-2"><label>ECG Notes</label><input type="text" class="form-control" id="ecg"></div>
                    <div class="col-md-6 mb-2"><label>ECHO</label><input type="text" class="form-control" id="echo"></div>
                    <div class="col-md-6 mb-2"><label>CMR/CT</label><input type="text" class="form-control" id="cmr"></div>
                </div>

                <h6 class="text-secondary mt-4 fw-bold bg-light p-2 rounded">5. Risk Factors & Comorbidities</h6>
                <div class="row">
                    <div class="col-md-2 mb-2"><label>DM</label><select class="form-select" id="dm"><option value="No">No</option><option value="Yes">Yes</option></select></div>
                    <div class="col-md-2 mb-2"><label>HTN</label><select class="form-select" id="htn"><option value="No">No</option><option value="Yes">Yes</option></select></div>
                    <div class="col-md-3 mb-2"><label>IHD</label><select class="form-select" id="ihd"><option value="No">No</option><option value="STEMI">STEMI</option><option value="NSTEMI">NSTEMI</option></select></div>
                    <div class="col-md-2 mb-2"><label>AF</label><select class="form-select" id="af"><option value="No">No</option><option value="Yes">Yes</option></select></div>
                    <div class="col-md-3 mb-2"><label>Smoker</label><select class="form-select" id="smoker"><option value="Never">Never</option><option value="Current">Current</option><option value="Former">Former</option></select></div>
                    
                    <div class="col-md-2 mb-2"><label>CKD</label><select class="form-select" id="ckd"><option value="No">No</option><option value="Yes">Yes</option></select></div>
                    <div class="col-md-2 mb-2"><label>CVA</label><select class="form-select" id="cva"><option value="No">No</option><option value="Yes">Yes</option></select></div>
                    <div class="col-md-2 mb-2"><label>PCI</label><select class="form-select" id="pci"><option value="No">No</option><option value="Yes">Yes</option></select></div>
                    <div class="col-md-2 mb-2"><label>CABG</label><select class="form-select" id="cabg"><option value="No">No</option><option value="Yes">Yes</option></select></div>
                    <div class="col-md-4 mb-2"><label>Dyslipidemia</label><select class="form-select" id="dyslip"><option value="No">No</option><option value="Yes">Yes</option></select></div>
                </div>

                <h6 class="text-secondary mt-4 fw-bold bg-light p-2 rounded">6. Outcomes & GDMT</h6>
                <div class="row">
                    <div class="col-md-4 mb-2"><label>Discharged on Quadruple GDMT?</label><select class="form-select" id="quad"><option value="No">No</option><option value="Yes">Yes</option></select></div>
                    <div class="col-md-4 mb-2"><label>Discharged on Triple GDMT?</label><select class="form-select" id="triple"><option value="No">No</option><option value="Yes">Yes</option></select></div>
                    <div class="col-md-4 mb-2"><label>Mortality</label><select class="form-select" id="mortality"><option value="Alive">Alive</option><option value="In-hospital">In-hospital</option><option value="Out of hospital">Out of hospital</option></select></div>
                </div>
                
                <hr class="mt-4 mb-4">
                <button type="submit" class="btn btn-success w-100 fw-bold py-3 fs-5 shadow">Save Patient to Registry</button>
            </form>
        </div>
    </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
